# =============================================================================
# TaipanStack — Custom Semgrep Rules
# =============================================================================
# Enforces proper error handling when using TaipanStack's Result types.
# Developers MUST handle the Err() branch when matching on Result values.
# =============================================================================

rules:
  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 1: Match on Result must include `case Err(...)`
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.result-err-not-handled
    languages: [python]
    severity: WARNING
    message: >
      Missing `case Err(...)` branch in Result pattern match.
      TaipanStack requires explicit error handling for all Result values.
      Add a `case Err(error):` branch to handle the failure case.
      See: https://github.com/gabrielima7/TaipanStack#error-handling
    metadata:
      category: correctness
      confidence: HIGH
      technology:
        - taipanstack
      references:
        - https://github.com/gabrielima7/TaipanStack
    patterns:
      - pattern: |
          match $RESULT:
              case Ok($VAL):
                  ...
      - pattern-not: |
          match $RESULT:
              case Ok($VAL):
                  ...
              case Err($ERR):
                  ...
      - pattern-not: |
          match $RESULT:
              case Err($ERR):
                  ...
              case Ok($VAL):
                  ...

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 2: Do not discard the return value of @safe-decorated functions
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.result-value-discarded
    languages: [python]
    severity: WARNING
    message: >
      Return value of a function decorated with `@safe` or `@safe_from` is
      being discarded. This silently swallows potential errors. Assign the
      result to a variable and handle both Ok and Err cases.
    metadata:
      category: correctness
      confidence: MEDIUM
      technology:
        - taipanstack
    pattern-either:
      - patterns:
          - pattern: |
              @safe
              def $FUNC(...):
                  ...

              ...

              $FUNC(...)
          - pattern-not: $X = $FUNC(...)
          - pattern-not: return $FUNC(...)
          - pattern-not: yield $FUNC(...)
      - patterns:
          - pattern: |
              @safe_from(...)
              def $FUNC(...):
                  ...

              ...

              $FUNC(...)
          - pattern-not: $X = $FUNC(...)
          - pattern-not: return $FUNC(...)
          - pattern-not: yield $FUNC(...)

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 3: Do not use bare `unwrap()` on Result without prior check
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.result-unsafe-unwrap
    languages: [python]
    severity: WARNING
    message: >
      Calling `.unwrap()` on a Result without checking `is_ok()` first can
      raise an UnwrapError at runtime. Prefer `match` with explicit
      `Ok`/`Err` handling, or use `unwrap_or()` / `unwrap_or_else()`.
    metadata:
      category: correctness
      confidence: HIGH
      technology:
        - taipanstack
    pattern: $RESULT.unwrap()

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 4: Enforce timeout on requests
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.requests-missing-timeout
    languages: [python]
    severity: ERROR
    message: >
      A `requests` call was made without a `timeout` argument.
      This can lead to a hanging process if the server never responds, causing Denial of Service.
      Always specify a `timeout` argument (e.g., `timeout=10`).
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-400: Uncontrolled Resource Consumption"
      owasp: "A06:2021 - Vulnerable and Outdated Components"
      technology:
        - requests
    patterns:
      - pattern-either:
          - pattern: requests.get(...)
          - pattern: requests.post(...)
          - pattern: requests.put(...)
          - pattern: requests.delete(...)
          - pattern: requests.patch(...)
          - pattern: requests.head(...)
          - pattern: requests.options(...)
          - pattern: requests.request(...)
      - pattern-not: requests.$METHOD(..., timeout=$TIMEOUT, ...)

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 5: Detect insecure usage of `eval()`
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.security-insecure-eval
    languages: [python]
    severity: ERROR
    message: >
      The use of `eval()` is highly discouraged and can lead to arbitrary code execution
      if used with untrusted user input. Use `ast.literal_eval()` for safely evaluating
      strings containing Python expressions.
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      owasp: "A03:2021 - Injection"
      technology:
        - python
    patterns:
      - pattern: eval(...)

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 6: Detect insecure deserialization with pickle
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.security-insecure-pickle
    languages: [python]
    severity: ERROR
    message: >
      Using `pickle` to deserialize untrusted data can lead to arbitrary code
      execution. Use safer formats like JSON (`json.loads()`) for data exchange.
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      technology:
        - python
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
      - pattern: _pickle.load(...)
      - pattern: _pickle.loads(...)
      - pattern: cPickle.load(...)
      - pattern: cPickle.loads(...)

  # ─────────────────────────────────────────────────────────────────────────────
  # Rule 7: Detect use of $ instead of \Z in regex validation
  # ─────────────────────────────────────────────────────────────────────────────
  - id: taipanstack.security-regex-dollar-anchor
    languages: [python]
    severity: ERROR
    message: >
      When writing regular expressions for strict string validation in Python, specifically within
      `taipanstack.security.validators` and `taipanstack.config.models`, use the `\Z` anchor
      instead of `$` to ensure absolute string termination and prevent bypasses via trailing newline
      characters (e.g., `\n`).
    metadata:
      category: security
      confidence: HIGH
      cwe: "CWE-20: Improper Input Validation"
      owasp: "A03:2021 - Injection"
      technology:
        - python
    patterns:
      - pattern-either:
          - pattern: re.match($REGEX, ...)
          - pattern: re.search($REGEX, ...)
          - pattern: re.fullmatch($REGEX, ...)
          - pattern: re.compile($REGEX, ...)
      - pattern-inside: |
          $REGEX = $STR
          ...
      - metavariable-regex:
          metavariable: $STR
          regex: '.*\$[\042\047]'
